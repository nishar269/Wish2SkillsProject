[build]
  command = "rm -rf .next node_modules/.cache && npm run build"
  publish = ".next"

[[plugins]]
  package = "@netlify/plugin-nextjs"

[build.environment]
  NEXT_USE_NETLIFY_EDGE = "false"
  NODE_VERSION = "20"
  AUTH_TRUST_HOST = "true"
  AUTH_URL = "https://wish2skill.netlify.app"

# Prevent stale CDN cache from serving old UI
[[headers]]
  for = "/*"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/_next/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
